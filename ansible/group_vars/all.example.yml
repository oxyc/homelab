# Copy to all.yml (gitignored).
# HomeKit/Scrypted is just a compose profile. Empty = Frigate + Caddy only (test first).
# Add 'homekit' and re-run (make deploy) to also bring up Scrypted.
compose_profiles: []
# compose_profiles: [homekit]

# HAOS image to download for the VM (pin a version).
haos_image_url: "https://github.com/home-assistant/operating-system/releases/download/14.0/haos_ova-14.0.qcow2.xz"

# Tailscale auth key: NOT stored here. Read from the same .env (TS_AUTHKEY) so all
# secrets live in one Bitwarden note. Export it before running, or pass -e ts_authkey=...
ts_authkey: "{{ lookup('ansible.builtin.env', 'TS_AUTHKEY') }}"
ts_hostname: pve              # tailnet node name -> `ssh root@pve`, https://pve:8006

# Host hardening
admin_user: oxyc
admin_ssh_pubkey: "ssh-ed25519 AAAA...replace-with-your-public-key... you@laptop"  # PUBLIC key
# Advertise the home LAN so the phone reaches HA/Frigate/cameras through the host
# (the single "way in"). Set to your real LAN CIDR; approve via tailscale/acl.hujson.
ts_advertise_routes: "192.168.10.0/24"
