# Proxmox host hardening. ORDER MATTERS: provision the admin user + SSH keys BEFORE
# tightening sshd, so you never lock yourself out. (Tailscale SSH is a separate daemon and
# stays available regardless — an extra safety net if sshd is ever misconfigured.)

- name: Ensure sudo is installed (Proxmox/Debian base ships without it → visudo missing)
  ansible.builtin.apt:
    name: sudo
    state: present

- name: Create admin user (sudo group)
  ansible.builtin.user:
    name: "{{ admin_user }}"
    groups: sudo
    append: true
    shell: /bin/bash
    create_home: true

- name: Passwordless sudo for admin (homelab; the SSH key is the real gate)
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/10-{{ admin_user }}"
    content: "{{ admin_user }} ALL=(ALL) NOPASSWD:ALL\n"
    mode: "0440"
    validate: "visudo -cf %s"

- name: Authorize SSH keys from GitHub for admin and root
  ansible.posix.authorized_key:
    user: "{{ item }}"
    key: "https://github.com/{{ admin_github_user }}.keys"   # module fetches the URL
  loop:
    - "{{ admin_user }}"
    - root

- name: Harden sshd (key-only; root key-only)
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    content: |
      PermitRootLogin prohibit-password
      PasswordAuthentication no
      KbdInteractiveAuthentication no
      X11Forwarding no
      MaxAuthTries 3
    mode: "0644"
  notify: Restart sshd

- name: Validate the full sshd config (aborts before restart if broken)
  ansible.builtin.command: sshd -t
  changed_when: false

- name: Install unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present

- name: Enable automatic security updates (no auto-reboot of the hypervisor)
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    mode: "0644"

# fail2ban intentionally omitted: SSH is not internet-exposed (Tailscale-only, no port-forward),
# so there is no public brute-force surface for it to protect.
# Optional further hardening (manual/UI): Proxmox web-UI 2FA (TOTP), the pve-firewall.

# --- stability / self-maintenance ---
- name: Ensure the journald drop-in dir exists (not created by default)
  ansible.builtin.file:
    path: /etc/systemd/journald.conf.d
    state: directory
    mode: "0755"

- name: Cap journald disk usage (logs can't fill the disk)
  ansible.builtin.copy:
    dest: /etc/systemd/journald.conf.d/00-size.conf
    content: |
      [Journal]
      SystemMaxUse=500M
    mode: "0644"
  notify: Restart journald

- name: Enable periodic fstrim (SSD/NVMe longevity)
  ansible.builtin.systemd:
    name: fstrim.timer
    enabled: true
    state: started

- name: Install smartmontools (disk/NVMe health monitoring)
  ansible.builtin.apt:
    name: smartmontools
    state: present

- name: Disk-failure alert script (smartd -> HA webhook)
  ansible.builtin.copy:
    dest: /usr/local/bin/homelab-smartd-alert
    mode: "0755"
    content: |
      #!/bin/sh
      curl -fsS -m10 -X POST "http://{{ haos_ip }}:8123/api/webhook/homelab_alert" \
        -H 'Content-Type: application/json' \
        -d "{\"message\": \"SMART: $SMARTD_MESSAGE ($SMARTD_DEVICE)\"}" || true

- name: Point smartd at the alert script
  ansible.builtin.copy:
    dest: /etc/smartd.conf
    mode: "0644"
    content: |
      # -W DIFF,INFO,CRIT: log a 4C swing, log once at 65C, and ALERT at 72C. The 3060 micro
      # has no room for an NVMe heatsink and idles ~60C, so a temperature alert (not just a
      # SMART-failure alert) is our early warning before the drive thermally throttles.
      DEVICESCAN -a -W 4,65,72 -o on -S on -n standby,q -m root -M exec /usr/local/bin/homelab-smartd-alert
  notify: Restart smartd

# --- external dead-man's switch (optional: only if HEALTHCHECK_URL is set) ---
# The host pings healthchecks.io on a timer; if the box (or its internet) dies, the pings
# stop and healthchecks.io alerts YOU. This is the only monitor that survives the box being
# fully down — every other alert here is sent *by* the box. URL kept in a 0600 file so it's
# never in a world-readable unit (anyone with it could mask an outage by pinging).
- name: Deploy the healthcheck ping URL (0600)
  ansible.builtin.copy:
    dest: /etc/homelab-healthcheck.env
    content: "HEALTHCHECK_URL={{ lookup('ansible.builtin.env', 'HEALTHCHECK_URL') }}\n"
    mode: "0600"
  when: lookup('ansible.builtin.env', 'HEALTHCHECK_URL') | length > 0

- name: Install the healthcheck ping service + timer
  ansible.builtin.copy:
    dest: "/etc/systemd/system/{{ item.name }}"
    content: "{{ item.content }}"
    mode: "0644"
  loop:
    - name: healthcheck-ping.service
      content: |
        [Service]
        Type=oneshot
        EnvironmentFile=/etc/homelab-healthcheck.env
        # --retry 3: ride out a transient blip so one dropped ping doesn't read as "down".
        ExecStart=/usr/bin/curl -fsS -m10 --retry 3 ${HEALTHCHECK_URL}
    - name: healthcheck-ping.timer
      content: |
        [Timer]
        OnBootSec=2min
        OnUnitActiveSec=15min
        [Install]
        WantedBy=timers.target
  when: lookup('ansible.builtin.env', 'HEALTHCHECK_URL') | length > 0

- name: Enable the healthcheck ping timer + send one ping now
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - healthcheck-ping.timer
    - healthcheck-ping.service   # oneshot → fires an immediate ping so the check goes green
  when: lookup('ansible.builtin.env', 'HEALTHCHECK_URL') | length > 0
