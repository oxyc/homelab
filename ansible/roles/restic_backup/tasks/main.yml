# restic -> Backblaze B2. Client-side encrypted, scoped app key, systemd timer.
# Backs up HA backups (incl .storage) + optionally secrets/vzdump. NOT Scrypted pairings.
- name: Install restic
  ansible.builtin.apt:
    name: restic
    state: present
  delegate_to: "{{ docker_lxc_ip }}"

- name: Deploy restic env (repo + B2 keys from docker/.env / Bitwarden)
  ansible.builtin.template:
    src: restic.env.j2          # RESTIC_REPOSITORY, RESTIC_PASSWORD, B2_ACCOUNT_ID/KEY
    dest: /etc/restic.env
    mode: "0600"
  delegate_to: "{{ docker_lxc_ip }}"

- name: Init repo (idempotent — ignores 'already initialized')
  ansible.builtin.shell: set -a; . /etc/restic.env; restic snapshots >/dev/null 2>&1 || restic init
  delegate_to: "{{ docker_lxc_ip }}"

- name: Install backup systemd service + timer
  ansible.builtin.copy:
    dest: "/etc/systemd/system/{{ item.name }}"
    content: "{{ item.content }}"
  loop:
    - name: restic-backup.service
      content: |
        [Service]
        EnvironmentFile=/etc/restic.env
        ExecStart=/usr/bin/restic backup /backups/ha --tag ha
        ExecStartPost=/usr/bin/restic forget --keep-daily 7 --keep-weekly 4 --prune
    - name: restic-backup.timer
      content: |
        [Timer]
        OnCalendar=daily
        Persistent=true
        [Install]
        WantedBy=timers.target
  delegate_to: "{{ docker_lxc_ip }}"
# TODO: ensure HA backups land in /backups/ha (HA backup automation -> shared path)
