# Backup pipeline:  HA --(SMB)--> /backups/ha on the LXC --(restic)--> Cloudflare R2.
# Samba (not NFS) because smbd is userspace and works cleanly in a container.
# All secrets come from the deployed /opt/homelab/.env (one Bitwarden note).
- name: Install Samba + restic
  ansible.builtin.apt:
    name: [samba, restic]
    state: present
  delegate_to: "{{ docker_lxc_ip }}"

# --- SMB share that HA targets as a network backup location ---
- name: Create backup-share user
  ansible.builtin.user:
    name: habackup
    system: true
    shell: /usr/sbin/nologin
    create_home: false
  delegate_to: "{{ docker_lxc_ip }}"

- name: Ensure backup dir
  ansible.builtin.file:
    path: /backups/ha
    state: directory
    owner: habackup
    group: habackup
    mode: "0750"
  delegate_to: "{{ docker_lxc_ip }}"

- name: Check if the SMB user already exists
  ansible.builtin.command: pdbedit -L -u habackup
  register: pdb
  changed_when: false
  failed_when: false
  delegate_to: "{{ docker_lxc_ip }}"

- name: Set SMB password (from SMB_PASSWORD env)
  ansible.builtin.shell: printf '%s\n%s\n' "$SMB_PASSWORD" "$SMB_PASSWORD" | smbpasswd -s -a habackup
  environment:
    SMB_PASSWORD: "{{ lookup('ansible.builtin.env', 'SMB_PASSWORD') }}"
  when: pdb.rc != 0
  no_log: true
  changed_when: true
  delegate_to: "{{ docker_lxc_ip }}"

- name: Configure the SMB share
  ansible.builtin.blockinfile:
    path: /etc/samba/smb.conf
    marker: "# {mark} habackup"
    block: |
      [habackup]
        path = /backups/ha
        read only = no
        valid users = habackup
        create mask = 0660
        directory mask = 0770
  notify: Restart smbd
  delegate_to: "{{ docker_lxc_ip }}"

# --- restic -> R2 (reads RESTIC_*/AWS_* from /opt/homelab/.env) ---
- name: Init repo (idempotent — ignores 'already initialized')
  ansible.builtin.shell: set -a; . /opt/homelab/.env; set +a; restic snapshots >/dev/null 2>&1 || restic init
  changed_when: false
  delegate_to: "{{ docker_lxc_ip }}"

- name: Install backup systemd service + timer
  ansible.builtin.copy:
    dest: "/etc/systemd/system/{{ item.name }}"
    content: "{{ item.content }}"
    mode: "0644"
  loop:
    - name: restic-backup.service
      content: |
        [Service]
        EnvironmentFile=/opt/homelab/.env
        ExecStart=/usr/bin/restic backup /backups/ha --tag ha
        ExecStartPost=/usr/bin/restic forget --keep-daily 7 --keep-weekly 4 --prune
        # dead-man's switch: ping HA only if the backup+prune succeeded
        ExecStartPost=/bin/sh -c 'curl -fsS -m10 -X POST http://$HAOS_IP:8123/api/webhook/homelab_backup_ok || true'
    - name: restic-backup.timer
      content: |
        [Timer]
        OnCalendar=daily
        Persistent=true
        [Install]
        WantedBy=timers.target
  delegate_to: "{{ docker_lxc_ip }}"

- name: Enable + start the restic timer
  ansible.builtin.systemd:
    name: restic-backup.timer
    enabled: true
    state: started
    daemon_reload: true
  delegate_to: "{{ docker_lxc_ip }}"
# HA side (manual, one-time): Settings -> System -> Storage -> Add network storage (SMB):
#   host = <docker_lxc_ip>, share = habackup, user/pass = habackup / SMB_PASSWORD,
#   usage = Backups. Then set it as the backup location and schedule backups.
