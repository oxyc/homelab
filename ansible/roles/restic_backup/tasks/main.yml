# restic -> Cloudflare R2 (S3). Client-side encrypted, systemd timer.
# Backend-agnostic: reads RESTIC_REPOSITORY/RESTIC_PASSWORD + AWS_* creds straight from the
# already-deployed /opt/homelab/.env (the one Bitwarden note). NOT Scrypted pairings.
- name: Install restic
  ansible.builtin.apt:
    name: restic
    state: present
  delegate_to: "{{ docker_lxc_ip }}"

- name: Init repo (idempotent — ignores 'already initialized')
  ansible.builtin.shell: set -a; . /opt/homelab/.env; set +a; restic snapshots >/dev/null 2>&1 || restic init
  changed_when: false
  delegate_to: "{{ docker_lxc_ip }}"

- name: Install backup systemd service + timer
  ansible.builtin.copy:
    dest: "/etc/systemd/system/{{ item.name }}"
    content: "{{ item.content }}"
    mode: "0644"
  loop:
    - name: restic-backup.service
      content: |
        [Service]
        EnvironmentFile=/opt/homelab/.env
        ExecStart=/usr/bin/restic backup /backups/ha --tag ha
        ExecStartPost=/usr/bin/restic forget --keep-daily 7 --keep-weekly 4 --prune
    - name: restic-backup.timer
      content: |
        [Timer]
        OnCalendar=daily
        Persistent=true
        [Install]
        WantedBy=timers.target
  delegate_to: "{{ docker_lxc_ip }}"
# TODO: ensure HA backups land in /backups/ha (HA Google-Drive-style add-on -> shared path,
#       or sync the HAOS VM's /backup into the LXC before restic runs).
