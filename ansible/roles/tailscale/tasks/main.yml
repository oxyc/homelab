# Tailscale on the Proxmox host: SSH in from your phone over the tailnet, no keys/ports.
- name: Install Tailscale
  ansible.builtin.shell: curl -fsSL https://tailscale.com/install.sh | sh
  args:
    creates: /usr/bin/tailscale

- name: Enable IP forwarding (only needed if advertising routes)
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: "1"
    state: present
    reload: true
  loop:
    - net.ipv4.ip_forward
    - net.ipv6.conf.all.forwarding
  when: ts_advertise_routes | length > 0

- name: Check whether Tailscale is already connected
  ansible.builtin.command: tailscale status
  register: ts_status
  changed_when: false
  failed_when: false

- name: Join Tailscale (only when not already connected, so a single-use key is safe)
  ansible.builtin.command:
    cmd: >-
      tailscale up --authkey={{ ts_authkey }} --hostname={{ ts_hostname }}
      {{ '--ssh' if ts_ssh else '' }}
      {{ '--advertise-routes=' + ts_advertise_routes if ts_advertise_routes | length > 0 else '' }}
  when: ts_status.rc != 0
  changed_when: true
  no_log: true                # contains the auth key
