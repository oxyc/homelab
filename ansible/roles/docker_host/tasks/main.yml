# docker_host: create the LXC (real runs only) then deploy the compose stack.
# The stack-deploy half is what the molecule scenario exercises.
- name: Create + prepare the Docker LXC
  ansible.builtin.import_tasks: create_lxc.yml
  when: not molecule_test            # needs a real Proxmox API; skipped under molecule

- name: Deploy the compose stack
  ansible.builtin.import_tasks: deploy_stack.yml
