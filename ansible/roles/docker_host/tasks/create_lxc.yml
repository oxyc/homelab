# Create the privileged LXC + install Docker. Needs a real Proxmox host.
- name: Create privileged Docker LXC
  community.proxmox.proxmox:
    vmid: "{{ docker_ctid }}"
    node: "{{ ansible_hostname }}"
    hostname: docker
    ostemplate: "local:vztmpl/debian-12-standard_amd64.tar.zst"
    cores: 4
    memory: 4096
    unprivileged: false                 # needed for /dev/dri passthrough
    features: "nesting=1"
    netif: '{"net0":"name=eth0,bridge=vmbr0,ip=dhcp"}'
    state: present

# /dev/dri passthrough must be added to the CT config (idempotent append).
- name: Bind host iGPU into the LXC
  ansible.builtin.blockinfile:
    path: "/etc/pve/lxc/{{ docker_ctid }}.conf"
    marker: "# {mark} igpu"
    block: |
      lxc.cgroup2.devices.allow: c 226:* rwm
      lxc.mount.entry: /dev/dri dev/dri none bind,optional,create=dir

- name: Ensure LXC running
  community.proxmox.proxmox:
    vmid: "{{ docker_ctid }}"
    state: started

- name: Install Docker in the LXC
  ansible.builtin.shell: curl -fsSL https://get.docker.com | sh
  args:
    creates: /usr/bin/docker
  delegate_to: "{{ docker_lxc_ip }}"
