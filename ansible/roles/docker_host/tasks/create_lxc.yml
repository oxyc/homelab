# Create the privileged LXC and bootstrap it so ansible can reach it (SSH key + python).
# Runs on the pve host; uses `pct` for the bits that must happen before SSH works.
- name: Create privileged Docker LXC
  community.proxmox.proxmox:
    vmid: "{{ docker_ctid }}"
    node: "{{ ansible_hostname }}"
    hostname: docker
    ostemplate: "local:vztmpl/debian-12-standard_amd64.tar.zst"
    cores: 4
    memory: 4096
    unprivileged: false                 # needed for /dev/dri passthrough
    features: "nesting=1"
    # static IP (matches the ip-plan) so delegation hits a known address, no DHCP reservation race
    netif: '{"net0":"name=eth0,bridge=vmbr0,ip={{ docker_lxc_ip }}/24,gw={{ docker_lxc_gw }}"}'
    nameserver: "{{ docker_lxc_gw }}"
    pubkey: "{{ lookup('ansible.builtin.url', 'https://github.com/' + admin_github_user + '.keys', split_lines=false) }}"
    state: present

# /dev/dri passthrough — written before first boot so it applies on start.
- name: Bind host iGPU into the LXC
  ansible.builtin.blockinfile:
    path: "/etc/pve/lxc/{{ docker_ctid }}.conf"
    marker: "# {mark} igpu"
    block: |
      lxc.cgroup2.devices.allow: c 226:* rwm
      lxc.mount.entry: /dev/dri dev/dri none bind,optional,create=dir

- name: Ensure LXC running
  community.proxmox.proxmox:
    vmid: "{{ docker_ctid }}"
    state: started

- name: Bootstrap python + ssh inside the LXC (retry — container net may not be up instantly)
  ansible.builtin.command: >-
    pct exec {{ docker_ctid }} -- sh -c
    'apt-get update -qq && apt-get install -y -qq python3 curl openssh-server sudo && systemctl enable --now ssh'
  register: lxc_boot
  until: lxc_boot.rc == 0
  retries: 10
  delay: 6
  changed_when: true

- name: Register the LXC as a delegation target (root + key)
  ansible.builtin.add_host:
    name: "{{ docker_lxc_ip }}"
    ansible_host: "{{ docker_lxc_ip }}"
    ansible_user: root
  changed_when: false

- name: Install Docker in the LXC (via pct, idempotent)
  ansible.builtin.command: >-
    pct exec {{ docker_ctid }} -- sh -c
    'command -v docker >/dev/null || curl -fsSL https://get.docker.com | sh'
  changed_when: true
