# Deliver the compose stack and bring it up — on the LXC (delegate_to docker_lxc_ip).
# The HomeKit toggle is just Docker Compose's own profiles feature: set
# compose_profiles: [homekit] (in group_vars) to include Scrypted. No extra logic.
- name: Ensure stack dir
  ansible.builtin.file:
    path: "{{ homelab_dir }}"
    state: directory
    mode: "0750"
  delegate_to: "{{ docker_lxc_ip }}"

- name: Sync compose files into the LXC
  ansible.builtin.copy:
    src: "{{ compose_src }}/"
    dest: "{{ homelab_dir }}/"
    mode: "0644"            # files; dirs get +x via directory_mode (traversable)
    directory_mode: "0755"
  delegate_to: "{{ docker_lxc_ip }}"

- name: Provide .env (real = docker/.env; molecule = docker/.env.example)
  ansible.builtin.copy:
    src: "{{ compose_src }}/{{ '.env.example' if molecule_test else '.env' }}"
    dest: "{{ homelab_dir }}/.env"
    mode: "0600"
  delegate_to: "{{ docker_lxc_ip }}"

- name: Bring up the stack
  community.docker.docker_compose_v2:
    project_src: "{{ homelab_dir }}"
    profiles: "{{ compose_profiles }}"
    state: present
  when: not molecule_test          # molecule image has no docker daemon
  delegate_to: "{{ docker_lxc_ip }}"

# --- yt-dlp canary: extraction breaks when YouTube changes; catch it from OUR residential IP
# (a cloud/CI runner gets YouTube's datacenter bot-block, so this MUST run on the box). Weekly
# it extracts an evergreen video via the running trailer-service; a failure => bump YTDLP_VERSION.
- name: Install the trailer-extraction canary (self-skips if trailers isn't running)
  ansible.builtin.copy:
    dest: "/etc/systemd/system/{{ item.name }}"
    content: "{{ item.content }}"
    mode: "0644"
  loop:
    - name: trailer-canary.service
      content: |
        [Service]
        EnvironmentFile={{ homelab_dir }}/.env
        # No trailer-service container (trailers profile off) => skip quietly. Else a failed
        # extraction of a known evergreen video (Big Buck Bunny) => yt-dlp/YouTube broke => alert.
        ExecStart=/bin/sh -c 'docker exec trailer-service true 2>/dev/null || exit 0; docker exec trailer-service curl -fsS -m120 -o /dev/null http://localhost:8092/play/aqz-KE-bpKQ.mp4 || { curl -fsS -m10 -X POST http://$HAOS_IP:8123/api/webhook/homelab_alert -H "Content-Type: application/json" -d "{\"message\": \"Trailer canary FAILED - yt-dlp/YouTube likely broke; bump YTDLP_VERSION\"}"; exit 1; }'
    - name: trailer-canary.timer
      content: |
        [Timer]
        OnCalendar=weekly
        Persistent=true
        [Install]
        WantedBy=timers.target
  when: not molecule_test
  delegate_to: "{{ docker_lxc_ip }}"

- name: Enable the trailer-canary timer
  ansible.builtin.systemd:
    name: trailer-canary.timer
    enabled: true
    state: started
    daemon_reload: true
  when: not molecule_test
  delegate_to: "{{ docker_lxc_ip }}"
