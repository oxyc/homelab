- name: Verify
  hosts: all
  vars:
    homelab_dir: /opt/homelab
  tasks:
    - name: Compose + env delivered
      ansible.builtin.stat:
        path: "{{ homelab_dir }}/{{ item }}"
      register: f
      failed_when: not f.stat.exists
      loop:
        - compose.yml
        - frigate/config.yml
        - .env
        - .deployed_profiles

    - name: Read recorded profiles
      ansible.builtin.slurp:
        src: "{{ homelab_dir }}/.deployed_profiles"
      register: profiles

    - name: HomeKit profile selected when enable_homekit=true
      ansible.builtin.assert:
        that: "'homekit' in (profiles.content | b64decode)"
        fail_msg: "enable_homekit=true but 'homekit' profile not recorded"
        success_msg: "toggle works: homekit profile active"
