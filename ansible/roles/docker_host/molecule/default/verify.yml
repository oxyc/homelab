- name: Verify
  hosts: all
  vars:
    homelab_dir: /opt/homelab
  tasks:
    - name: Compose + config + env delivered
      ansible.builtin.stat:
        path: "{{ homelab_dir }}/{{ item }}"
      register: f
      failed_when: not f.stat.exists
      loop:
        - compose.yml
        - frigate/config.yml
        - .env
    # Idempotence (no changes on a second converge) is checked by molecule itself.
