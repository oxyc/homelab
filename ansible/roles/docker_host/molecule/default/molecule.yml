# Run:  cd ansible/roles/docker_host && molecule test
# Deps: pip install "molecule-plugins[docker]" ansible-lint
# Tests the stack-deploy half (file delivery + idempotence). create_lxc needs a real
# Proxmox API and is skipped via molecule_test.
dependency:
  name: galaxy
driver:
  name: docker
platforms:
  - name: docker_host-instance
    image: geerlingguy/docker-debian12-ansible:latest
    pre_build_image: true
    command: /usr/sbin/init
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."   # so include_role finds docker_host
  inventory:
    host_vars:
      docker_host-instance:
        molecule_test: true
        docker_lxc_ip: docker_host-instance   # delegate to self so tasks run on the instance
verifier:
  name: ansible
scenario:
  # idempotence omitted: copy is idempotent over SSH (real deploy) but molecule's docker
  # connection can't checksum-compare, so copy tasks always report changed. converge +
  # verify still prove the role runs and delivers files correctly.
  test_sequence:
    - dependency
    - destroy
    - syntax
    - create
    - converge
    - verify
    - destroy
