# Proxmox host base config. Idempotent.
# PVE 9 ships deb822 `.sources`; the enterprise pve/ceph repos 401 without a paid subscription
# and break every apt run, so disable them and add pve-no-subscription (deb822).
- name: Find enterprise Proxmox/Ceph repo files
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d
    patterns: ["pve-enterprise.sources", "ceph.sources"]
  register: pve_enterprise_repos

- name: Disable enterprise repos (no subscription)
  ansible.builtin.lineinfile:
    path: "{{ item.path }}"
    line: "Enabled: false"
    state: present
  loop: "{{ pve_enterprise_repos.files }}"
  loop_control:
    label: "{{ item.path }}"

- name: Remove any legacy no-subscription .list (superseded by the deb822 .sources)
  ansible.builtin.file:
    path: /etc/apt/sources.list.d/pve-no-subscription.list
    state: absent

- name: Add the pve-no-subscription repo (deb822)
  ansible.builtin.copy:
    dest: /etc/apt/sources.list.d/pve-no-subscription.sources
    mode: "0644"
    content: |
      Types: deb
      URIs: http://download.proxmox.com/debian/pve
      Suites: {{ ansible_distribution_release }}
      Components: pve-no-subscription
      Signed-By: /usr/share/keyrings/proxmox-archive-keyring.gpg
  register: nosub_repo

- name: Refresh apt cache after repo change
  ansible.builtin.apt:
    update_cache: true
  when: nosub_repo is changed

- name: Format NVR disk ext4
  community.general.filesystem:
    fstype: ext4
    dev: "{{ nvr_disk_device }}"
    # force: false  # NEVER set force on a disk with data

- name: Mount NVR disk
  ansible.posix.mount:
    path: "{{ nvr_mount }}"
    src: "{{ nvr_disk_device }}"
    fstype: ext4
    opts: defaults,noatime
    state: mounted

- name: Read current Proxmox storage
  ansible.builtin.command: pvesm status
  register: pvesm
  changed_when: false

- name: Register NVR as Proxmox directory storage
  ansible.builtin.command: >-
    pvesm add dir nvr --path {{ nvr_mount }} --content backup,images,rootdir
  when: "'nvr' not in pvesm.stdout"
  changed_when: true

# --- iGPU (QuickSync) for the Docker LXC ---
- name: Ensure i915 module is loaded
  community.general.modprobe:
    name: i915
    state: present

- name: Verify the render node exists (QuickSync available to pass into the LXC)
  ansible.builtin.stat:
    path: /dev/dri/renderD128
  register: dri
  failed_when: not dri.stat.exists

# --- Networking note (no host VLAN config needed) ---
# Cameras live on a separate VLAN handled by Omada; the host + guests sit on the mgmt
# LAN (vmbr0), and the Omada gateway routes mgmt->camera per ACL. So no VLAN-aware
# bridge or tagging is required on Proxmox — segmentation is entirely on Omada.
