# Top-level playbook. Run phases with tags:
#   ansible-playbook site.yml --tags host
#   ansible-playbook site.yml --tags haos
#   ansible-playbook site.yml --tags docker
#   ansible-playbook site.yml --tags backup
# NOTE: backup/cameras reach the LXC via an add_host created in the `docker` phase, so include
#   --tags docker when running them (or just run the full playbook). They won't run standalone.
# Always dry-run first on the real box:  --check --diff

- name: Provision homelab
  hosts: pve
  gather_facts: true
  module_defaults:
    community.proxmox.proxmox: &pve_api
      api_host: "{{ pve_api_host }}"
      api_user: "{{ pve_api_user }}"
      api_password: "{{ pve_api_password }}"
      validate_certs: false
    community.proxmox.proxmox_kvm: *pve_api
  roles:
    - role: proxmox_host       # repos, NVMe ext4 + mount, network bridges/VLAN, /dev/dri perms
      tags: [host]
    - role: host_hardening     # admin user + sudo, SSH key, sshd hardening, auto security updates
      tags: [host, hardening]
    - role: tailscale          # remote SSH from phone over the tailnet
      tags: [tailscale, remote]
    - role: haos_vm            # download + create HAOS VM (then restore HA backup manually)
      tags: [haos]
    - role: docker_host        # create privileged LXC, install docker, sync ../docker, compose up
      tags: [docker]
    - role: restic_backup      # restic -> B2 systemd timer (HA backups + optional secrets/vzdump)
      tags: [backup]
    - role: reolink_cameras    # encoder/NTP config via the Reolink API (run --check first)
      tags: [cameras]
