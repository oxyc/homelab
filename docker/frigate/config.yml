# Frigate config. Secrets via {FRIGATE_*} env vars (only FRIGATE_-prefixed work).
# Works WITHOUT HomeKit. The go2rtc restreams below are reused by Scrypted later
# (when you enable the `homekit` compose profile) — nothing here needs to change then.
#
# CX820:  main = 4K H.265 (record, copy/no transcode), sub = H.264 (detect).
# Doorbell (Reolink PoE Video Doorbell, 2K, 4:3): keep its main as H.264 if possible
#          (then no transcode needed for HomeKit later). RTSP kept for 2-way audio.

mqtt:
  enabled: true
  host: "{FRIGATE_MQTT_HOST}"     # HA Mosquitto add-on
  user: "{FRIGATE_MQTT_USER}"
  password: "{FRIGATE_MQTT_PASSWORD}"

detectors:
  cpu1:
    type: cpu                     # detection on CPU; iGPU reserved for Scrypted transcode later

ffmpeg:
  hwaccel_args: preset-vaapi      # iGPU decode for detect streams (record is copy)

go2rtc:
  streams:
    # --- CX820 (one connection, fanned out) ---
    cx820_main:                   # H.265 4K
      - "http://{FRIGATE_CX820_IP}/flv?port=1935&app=bcs&stream=channel0_main.bcs&user={FRIGATE_CAM_USER}&password={FRIGATE_CAM_PASS}"
      # RTSP fallback if FLV is flaky on your firmware:
      # - "rtsp://{FRIGATE_CAM_USER}:{FRIGATE_CAM_PASS}@{FRIGATE_CX820_IP}:554/h265Preview_01_main#backchannel=0"
    cx820_sub:                    # H.264 low-res
      - "http://{FRIGATE_CX820_IP}/flv?port=1935&app=bcs&stream=channel0_ext.bcs&user={FRIGATE_CAM_USER}&password={FRIGATE_CAM_PASS}"

    # --- Doorbell (PoE, 2K, 4:3). RTSP so the 2-way backchannel works for HomeKit later. ---
    doorbell_main:                # keep H.264 if the app allows (HomeKit-friendly, no transcode)
      - "rtsp://{FRIGATE_CAM_USER}:{FRIGATE_CAM_PASS}@{FRIGATE_DOORBELL_IP}:554/h264Preview_01_main"
    doorbell_sub:
      - "rtsp://{FRIGATE_CAM_USER}:{FRIGATE_CAM_PASS}@{FRIGATE_DOORBELL_IP}:554/h264Preview_01_sub#backchannel=0"

cameras:
  front:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/cx820_main      # H.265, copied to disk
          roles: [record]
        - path: rtsp://127.0.0.1:8554/cx820_sub       # H.264, cheap detect
          roles: [detect]
    detect:
      width: 640
      height: 480
      fps: 5
    objects:
      track: [person, car, dog, cat]

  doorbell:
    ffmpeg:
      inputs:
        - path: "rtsp://127.0.0.1:8554/doorbell_main?backchannel=0"
          roles: [record]
        - path: rtsp://127.0.0.1:8554/doorbell_sub
          roles: [detect]
    detect:
      width: 640                  # 4:3 doorbell
      height: 480
      fps: 5
    objects:
      track: [person, package]

record:
  enabled: true
  retain:
    days: 7
    mode: motion
  alerts:
    retain:
      days: 30
  detections:
    retain:
      days: 30

snapshots:
  enabled: true
  retain:
    default: 14

birdseye:
  enabled: true
  mode: objects

version: 0.16-0
