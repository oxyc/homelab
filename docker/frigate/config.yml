# Frigate config. Secrets via {FRIGATE_*} env vars (only FRIGATE_-prefixed work).
# Record = native H.265 main (copy, no transcode). Detect = H.264 sub.
# go2rtc holds ONE connection per device and restreams; Scrypted/HA pull from :8554.

mqtt:
  enabled: true
  host: <ha-mosquitto-ip>     # Frigate <-> HA events

detectors:
  cpu1:
    type: cpu                 # keep detection off the iGPU (reserved for Scrypted transcode)

go2rtc:
  streams:
    # CX820 4K — native FLV producer handles H.265; query-param auth (NOT user:pass@).
    cx820_main:
      - http://{FRIGATE_CX820_IP}/flv?port=1935&app=bcs&stream=channel0_main.bcs&user={FRIGATE_CAM_USER}&password={FRIGATE_CAM_PASS}
      # RTSP fallback if FLV is flaky on your firmware:
      # - "rtsp://{FRIGATE_CAM_USER}:{FRIGATE_CAM_PASS}@{FRIGATE_CX820_IP}:554/h264Preview_01_main#backchannel=0"
    cx820_sub:
      - http://{FRIGATE_CX820_IP}/flv?port=1935&app=bcs&stream=channel0_ext.bcs&user={FRIGATE_CAM_USER}&password={FRIGATE_CAM_PASS}
    # Doorbell — RTSP (FLV can't carry the 2-way backchannel). Keep backchannel on main only.
    doorbell_main:
      - "rtsp://{FRIGATE_CAM_USER}:{FRIGATE_CAM_PASS}@{FRIGATE_DOORBELL_IP}:554/h264Preview_01_main"
    doorbell_sub:
      - "rtsp://{FRIGATE_CAM_USER}:{FRIGATE_CAM_PASS}@{FRIGATE_DOORBELL_IP}:554/h264Preview_01_sub#backchannel=0"

cameras:
  front:
    ffmpeg:
      inputs:
        - path: rtsp://127.0.0.1:8554/cx820_main     # H.265, copied to disk
          roles: [record]
        - path: rtsp://127.0.0.1:8554/cx820_sub      # H.264, cheap detect
          roles: [detect]
    detect:
      width: 640
      height: 480
  doorbell:
    ffmpeg:
      inputs:
        - path: "rtsp://127.0.0.1:8554/doorbell_main?backchannel=0"
          roles: [record]
        - path: rtsp://127.0.0.1:8554/doorbell_sub
          roles: [detect]

record:
  enabled: true
  retain:
    days: 7
    mode: motion

snapshots:
  enabled: true

version: 0.16-0
