# Runs inside one privileged Docker LXC with /dev/dri bound in (shared QuickSync).
# Secrets/IPs come from ./.env (gitignored).
#
# Default `docker compose up`  => frigate + caddy (+ HA lives in its own VM).
# HomeKit later                => `docker compose --profile homekit up -d`   (adds scrypted)
# HA via Cloudflare Zero Trust => `docker compose --profile tunnel up -d`    (adds cloudflared)
# Den trailers (LAN-only)      => `docker compose --profile trailers up -d`  (adds trailer-service)
name: homelab

services:
  frigate:
    image: ghcr.io/blakeblackshear/frigate:${FRIGATE_VERSION:-stable}
    container_name: frigate
    restart: unless-stopped
    shm_size: "256mb"          # 2 cameras; bump if you add more
    devices:
      - /dev/dri:/dev/dri      # iGPU: vaapi decode for detect (record is copy)
    env_file: .env
    volumes:
      - ./frigate/config.yml:/config/config.yml:ro
      - frigate_data:/config
      - type: bind
        source: /mnt/nvr       # 2TB NVMe (ext4) bind-mounted from the LXC host
        target: /media/frigate
    ports:
      - "5000:5000"            # behind Caddy
      - "8554:8554"            # go2rtc RTSP restream (Scrypted/HA pull from here)
      - "8555:8555/tcp"
      - "8555:8555/udp"

  caddy:
    # Custom build = Caddy + cloudflare DNS module (for wildcard DNS-01 certs).
    build:
      context: ./caddy
      args:
        CADDY_VERSION: "${CADDY_VERSION:-2}"
    image: homelab-caddy:${CADDY_VERSION:-2}
    container_name: caddy
    restart: unless-stopped
    env_file: .env
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  # --- Cloudflare Tunnel: browser/family access to HA via Zero Trust (off by default) ---
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    profiles: ["tunnel"]       # docker compose --profile tunnel up -d
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    # No ports: outbound-only tunnel. Ingress + Access policy live in the CF dashboard.

  # --- HomeKit / HKSV: DISABLED until you opt in (see profile note at top) ---
  scrypted:
    image: ghcr.io/koush/scrypted:${SCRYPTED_VERSION:-latest}
    container_name: scrypted
    restart: unless-stopped
    profiles: ["homekit"]      # not started by a plain `docker compose up`
    network_mode: host         # HomeKit/HKSV need host mDNS on the LAN
    devices:
      - /dev/dri:/dev/dri      # iGPU: H.265 -> H.264 transcode for HomeKit/HKSV
    volumes:
      - scrypted_data:/server/volume   # HomeKit pairings live here (not backed up by choice)

  # --- Den trailer proxy: YouTube id -> App-Store-safe MP4 for inline tvOS playback ---
  # LAN-only by design: fronted by Caddy at https://trailers.${CADDY_LOCAL_DOMAIN}, never
  # published or tunneled — the Apple TV must be on the same LAN. Needs internet (yt-dlp
  # reaches YouTube), which the mgmt LAN has. No env_file: it only wants its own defaults,
  # so we don't leak the secrets in .env into an internet-facing container.
  # Image is built + pushed from github.com/oxyc/den-trailer-service (GHCR).
  # Opt in: `docker compose --profile trailers up -d`.
  trailer-service:
    image: ghcr.io/oxyc/den-trailer-service:${TRAILER_SERVICE_VERSION:-latest}
    container_name: trailer-service
    restart: unless-stopped
    profiles: ["trailers"]
    volumes:
      - trailer_cache:/cache
    # No published port: Caddy reverse-proxies it over the LAN (https, real cert → no ATS
    # exception needed in Den). Add `ports: ["8092:8092"]` only if you want direct
    # http://<lxc-ip>:8092 access instead — then Den needs NSAllowsLocalNetworking.

volumes:
  frigate_data:
  scrypted_data:
  caddy_data:
  caddy_config:
  trailer_cache:
