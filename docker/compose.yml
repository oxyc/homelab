# Runs inside one privileged Docker LXC with /dev/dri bound in (shared QuickSync).
# Secrets/IPs come from ./.env (gitignored).
#
# Default `docker compose up`  => frigate + caddy (+ HA lives in its own VM).
# HomeKit later                => `docker compose --profile homekit up -d`  (adds scrypted)
name: homelab

services:
  frigate:
    image: ghcr.io/blakeblackshear/frigate:${FRIGATE_VERSION:-stable}
    container_name: frigate
    restart: unless-stopped
    shm_size: "256mb"          # 2 cameras; bump if you add more
    devices:
      - /dev/dri:/dev/dri      # iGPU: vaapi decode for detect (record is copy)
    env_file: .env
    volumes:
      - ./frigate/config.yml:/config/config.yml:ro
      - frigate_data:/config
      - type: bind
        source: /mnt/nvr       # 2TB NVMe (ext4) bind-mounted from the LXC host
        target: /media/frigate
    ports:
      - "5000:5000"            # behind Caddy
      - "8554:8554"            # go2rtc RTSP restream (Scrypted/HA pull from here)
      - "8555:8555/tcp"
      - "8555:8555/udp"

  caddy:
    # Custom build = Caddy + cloudflare DNS module (for wildcard DNS-01 certs).
    build:
      context: ./caddy
      args:
        CADDY_VERSION: "${CADDY_VERSION:-2}"
    image: homelab-caddy:${CADDY_VERSION:-2}
    container_name: caddy
    restart: unless-stopped
    env_file: .env
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

  # --- HomeKit / HKSV: DISABLED until you opt in (see profile note at top) ---
  scrypted:
    image: ghcr.io/koush/scrypted:${SCRYPTED_VERSION:-latest}
    container_name: scrypted
    restart: unless-stopped
    profiles: ["homekit"]      # not started by a plain `docker compose up`
    network_mode: host         # HomeKit/HKSV need host mDNS on the LAN
    devices:
      - /dev/dri:/dev/dri      # iGPU: H.265 -> H.264 transcode for HomeKit/HKSV
    volumes:
      - scrypted_data:/server/volume   # HomeKit pairings live here (not backed up by choice)

volumes:
  frigate_data:
  scrypted_data:
  caddy_data:
  caddy_config:
